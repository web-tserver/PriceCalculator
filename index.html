<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Price Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #000000; 
      color: #F5F5F7; 
      padding: 20px; 
      -webkit-font-smoothing: antialiased;
    }
    
    .calculator-container {
      width: 100%;
      max-width: 850px; 
      margin: 0 auto; 
      background: #121212; 
      border-radius: 32px; 
      padding: 32px; 
      border: 1px solid #1E1E1E;
      position: relative;
    }

    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .brand-subtitle { 
      color: #86868B; 
      font-size: 16px; 
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .reset-btn {
      background: #2C2C2E;
      color: #FF453A;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset-btn:hover { background: #3A3A3C; }
    
    /* Category Grid (Cards) */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .category-card {
      background: #1C1C1E;
      border: 2px solid transparent;
      border-radius: 24px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .category-card:hover {
      background: #2C2C2E;
    }

    .category-card.active {
      border-color: #0A84FF;
      background: rgba(10, 132, 255, 0.1);
    }

    .cat-icon {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #86868B;
      transition: color 0.2s ease;
    }

    .category-card.active .cat-icon {
      color: #0A84FF;
    }

    .cat-name {
      font-size: 12px;
      font-weight: 600;
      color: #86868B;
      line-height: 1.3;
      transition: color 0.2s ease;
    }

    .category-card.active .cat-name {
      color: #0A84FF;
    }
    
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .form-group { background: #1C1C1E; padding: 24px; border-radius: 28px; margin-bottom: 16px;}
    .section-title { display: block; font-weight: 600; margin-bottom: 16px; color: #FFFFFF; font-size: 18px; letter-spacing: -0.3px; }
    
    label.field-label { font-size: 13px; color: #86868B; margin-bottom: 8px; display: block; margin-top: 16px; font-weight: 500; }

    .input-field, .select-field { 
      width: 100%; padding: 16px; border-radius: 16px; border: none; background: #2C2C2E; 
      color: #FFFFFF; font-size: 15px; outline: none; margin-bottom: 4px; appearance: none; -webkit-appearance: none;
      transition: box-shadow 0.2s ease;
    }
    .select-field {
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2386868B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 16px center; padding-right: 40px;
    }
    .input-field:focus, .select-field:focus { box-shadow: 0 0 0 2px #0A84FF; }
    
    .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .checkbox-label { font-size: 15px; color: #D1D1D6; display: flex; align-items: center; cursor: pointer; font-weight: 500; }
    .checkbox-label input { margin-right: 12px; accent-color: #0A84FF; width: 18px; height: 18px; border-radius: 4px; }

    /* Steppers */
    .size-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; margin-bottom: 8px; }
    .size-item { display: flex; flex-direction: column; align-items: center; background: #2C2C2E; padding: 10px 6px; border-radius: 16px; }
    .size-item label { font-size: 13px; font-weight: 600; color: #FFFFFF; margin-bottom: 4px; }
    .surcharge-badge { font-size: 10px; color: #0A84FF; margin-bottom: 8px; height: 12px; font-weight: 600; text-align: center; }
    
    .stepper-wrapper { display: flex; align-items: center; background: #1C1C1E; border-radius: 12px; overflow: hidden; width: 100%;}
    .stepper-btn { display: flex; align-items: center; justify-content: center; background: none; border: none; color: #0A84FF; font-size: 18px; width: 26px; height: 32px; cursor: pointer; font-weight: bold; flex-shrink: 0;}
    .stepper-btn:active { background: #3A3A3C; }
    .size-input { width: 100%; text-align: center; padding: 8px 0; border: none; background: transparent; color: #FFFFFF; font-weight: 600; font-size: 15px; outline: none; -moz-appearance: textfield; min-width: 0;}
    .size-input::-webkit-outer-spin-button, .size-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .general-stepper { display: flex; width: 100%; background: #2C2C2E; border-radius: 16px; overflow: hidden; margin-bottom: 4px;}
    .general-stepper input { flex: 1; text-align: center; background: transparent; border: none; color: #fff; font-size: 16px; font-weight: 600; outline: none; -moz-appearance: textfield; min-width: 0;}
    .general-stepper button { width: 50px; background: transparent; border: none; color: #0A84FF; font-size: 20px; font-weight: bold; cursor: pointer; flex-shrink: 0;}
    .general-stepper button:active { background: #3A3A3C; }

    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .custom-size-box { display: none; animation: fadeIn 0.3s ease; }

    /* Sticky Footer */
    .price-display { 
      margin-top: 32px; 
      padding: 24px; 
      background: rgba(28, 28, 30, 0.85); 
      backdrop-filter: blur(25px); 
      -webkit-backdrop-filter: blur(25px);
      border-radius: 28px; 
      text-align: center; 
      border: 1px solid rgba(255,255,255,0.1);
      position: sticky; 
      bottom: 20px; 
      z-index: 100;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      width: 100%; 
    }

    .price-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 16px; color: #86868B; font-size: 13px; font-weight: 500; }
    .price-breakdown strong { color: #FFFFFF; font-size: 18px; display: block; margin-top: 4px; font-weight: 600; }

    .total-price { font-size: 16px; font-weight: 500; color: #86868B; padding-top: 16px; margin-top: 16px; border-top: 1px solid #3A3A3C; }
    .total-price span { color: #FFFFFF; font-size: 40px; display: block; margin-top: 4px; font-weight: 700; letter-spacing: -1px; }
    
    .warning { color: #FF453A; font-size: 13px; display: none; margin-top: 8px; font-weight: 500; }
    .pill-tag { background: #2C2C2E; color: #0A84FF; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-left: 8px; vertical-align: middle; }

    .breakdown-toggle { font-size: 13px; color: #0A84FF; cursor: pointer; font-weight: 600; margin-top: 12px; display: inline-block; }
    .breakdown-list { display: none; text-align: left; background: #000; padding: 16px; border-radius: 16px; margin-top: 16px; font-size: 13px; color: #D1D1D6; line-height: 1.6; max-height: 150px; overflow-y: auto;}
    .breakdown-list.show { display: block; }
    .breakdown-list ul { padding-left: 16px; }

    .wa-btn {
      background: #34C759;
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      width: 100%;
      margin-top: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .wa-btn:active { transform: scale(0.98); background: #2eb04f;}
    .wa-btn svg { width: 20px; height: 20px; fill: currentColor; }

    @media (max-width: 600px) {
      .calculator-container { padding: 20px; }
      .category-grid { grid-template-columns: repeat(4, 1fr); gap: 8px;}
      .price-display { padding: 16px; }
      .total-price span { font-size: 32px; }
      .wa-btn { padding: 14px; font-size: 15px;}
    }
  </style>
</head>
<body>

  <div class="calculator-container">
    <div class="header-flex">
      <div class="brand-subtitle">Product Pricelist Calculator</div>
      <button class="reset-btn" onclick="resetForm()">Clear Form</button>
    </div>

    <div class="category-grid">
      <div class="category-card active" data-category="sublimation" onclick="switchCategory('sublimation')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a8.5 8.5 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
        </div>
        <span class="cat-name">Sublimation</span>
      </div>

      <div class="category-card" data-category="silkscreen" onclick="switchCategory('silkscreen')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a8.5 8.5 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
        </div>
        <span class="cat-name">Silkscreen</span>
      </div>

      <div class="category-card" data-category="dtf_shirt" onclick="switchCategory('dtf_shirt')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a8.5 8.5 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
        </div>
        <span class="cat-name">DTF Shirt</span>
      </div>

      <div class="category-card" data-category="lanyard" onclick="switchCategory('lanyard')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4M12 2v4M8 6h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zM9 10h6M9 14h4"/></svg>
        </div>
        <span class="cat-name">Lanyard</span>
      </div>

      <div class="category-card" data-category="apron" onclick="switchCategory('apron')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8v4M6 6h12l1.5 16H4.5L6 6zM9 12h6v5H9z"/></svg>
        </div>
        <span class="cat-name">Apron</span>
      </div>

      <div class="category-card" data-category="cap" onclick="switchCategory('cap')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15a8 8 0 0 1 16 0"/><path d="M2 15h20v2a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-2z"/><path d="M12 4v3"/></svg>
        </div>
        <span class="cat-name">Cap</span>
      </div>

      <div class="category-card" data-category="bunting" onclick="switchCategory('bunting')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="4" width="10" height="12" rx="1"/><path d="M12 16v6M9 22h6M12 4V2"/></svg>
        </div>
        <span class="cat-name">Bunting</span>
      </div>

      <div class="category-card" data-category="banner" onclick="switchCategory('banner')">
        <div class="cat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="8" rx="1"/><path d="M4 4v16M20 4v16"/></svg>
        </div>
        <span class="cat-name">Banner</span>
      </div>
    </div>

    <div id="panel-sublimation" class="panel active">
      <div class="grid-layout">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="section-title">Sizes & Quantity <span class="pill-tag">Total: <span id="sub_totalQty">0</span></span></label>
          <div class="size-grid" id="sub_sizeGridContainer"></div>
        </div>
        <div class="form-group">
          <label class="section-title">Order Details</label>
          <label class="field-label">Design Type</label>
          <select id="sub_design" class="select-field calc-trigger"><option value="0">Catalogue Design (Free)</option><option value="50">Custom Design (+RM50)</option></select>
          <label class="field-label">Production</label>
          <select id="sub_urgent" class="select-field calc-trigger"><option value="0">Standard (14-28 Days)</option><option value="5">Urgent Order (+RM5/pcs)</option></select>
          <label class="field-label">Material</label>
          <select id="sub_material" class="select-field calc-trigger"><option value="0">Microfiber Reverse Eyelet</option><option value="3">Diamond 155GSM (+RM3)</option><option value="3">RJPK 170GSM (+RM3)</option><option value="8">Lycra 280GSM (+RM8)</option></select>
        </div>
        <div class="form-group">
          <label class="section-title">Add-Ons</label>
          <label class="field-label">Names & Numbers</label>
          <select id="sub_nameNum" class="select-field calc-trigger"><option value="0">None</option><option value="4">Name Only (+RM4)</option><option value="4">Number Only (+RM4)</option><option value="7">Name & Number (+RM7)</option></select>
          <label class="field-label">Style Modifications</label>
          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="sub_add_raglan" class="sub-addon calc-trigger" value="5" data-name="Raglan Sleeves"> Raglan Sleeves (+RM5)</label>
            <label class="checkbox-label"><input type="checkbox" id="sub_add_long" class="sub-addon calc-trigger" value="5" data-name="Long Sleeves"> Long Sleeves (+RM5)</label>
            <label class="checkbox-label"><input type="checkbox" id="sub_add_muslimah" class="sub-addon calc-trigger" value="15" data-name="Muslimah Cut"> Muslimah Cut (+RM15)</label>
            <label class="checkbox-label"><input type="checkbox" id="sub_add_oversize" class="sub-addon calc-trigger" value="15" data-name="Oversize"> Oversize (+RM15)</label>
            <label class="checkbox-label"><input type="checkbox" id="sub_add_pocket" class="sub-addon calc-trigger" value="3" data-name="Chest Pocket"> Chest Pocket (+RM3)</label>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-silkscreen" class="panel">
      <div class="grid-layout">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="section-title">Sizes & Quantity <span class="pill-tag">Total: <span id="silk_totalQty">0</span></span></label>
          <div class="size-grid" id="silk_sizeGridContainer"></div>
          <div id="silk_warning" class="warning">Minimum 10 pieces required!</div>
        </div>
        <div class="form-group">
          <label class="section-title">Base Shirt</label>
          <label class="field-label">Shirt Type</label>
          <select id="silk_shirtType" class="select-field calc-trigger">
            <option value="13.50">Roundneck (RM13.50)</option>
            <option value="18.50">Collar (RM18.50)</option>
            <option value="23.00">Polo (RM23.00)</option>
          </select>
          <label class="field-label">Add-ons</label>
          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="silk_longSleeve" class="calc-trigger" value="5"> Long Sleeve (+RM5)</label>
          </div>
        </div>
        <div class="form-group">
          <label class="section-title">Silkscreen Printing</label>
          <label class="field-label">Number of Colors</label>
          <select id="silk_colors" class="select-field calc-trigger">
            <option value="0">1 Color (1C)</option><option value="1">2 Colors (2C)</option>
            <option value="2">3 Colors (3C)</option><option value="3">4 Colors (4C)</option>
            <option value="4">5 Colors (5C)</option><option value="5">6 Colors (6C)</option>
            <option value="6">7 Colors (7C)</option><option value="7">8 Colors (8C)</option>
          </select>
        </div>
      </div>
    </div>

    <div id="panel-dtf_shirt" class="panel">
      <div class="grid-layout">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="section-title">Sizes & Quantity <span class="pill-tag">Total: <span id="dtf_totalQty">0</span></span></label>
          <div class="size-grid" id="dtf_sizeGridContainer"></div>
        </div>
        <div class="form-group">
          <label class="section-title">Base Shirt</label>
          <label class="field-label">Shirt Type</label>
          <select id="dtf_shirtType" class="select-field calc-trigger">
            <option value="13.50">Roundneck (RM13.50)</option>
            <option value="18.50">Collar (RM18.50)</option>
            <option value="23.00">Polo (RM23.00)</option>
          </select>
          <label class="field-label">Add-ons</label>
          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="dtf_longSleeve" class="calc-trigger" value="5"> Long Sleeve (+RM5)</label>
          </div>
        </div>
        <div class="form-group">
          <label class="section-title">DTF Print Size</label>
          <label class="field-label">Front/Back Print Size</label>
          <select id="dtf_printSize" class="select-field calc-trigger">
            <option value="12">Bigger Than A3 (RM12)</option>
            <option value="10">A3 (RM10)</option>
            <option value="8">A4 (RM8)</option>
            <option value="4">Smaller Than A4 (Avg RM4)</option>
            <option value="0">No Body Print</option>
          </select>
          <label class="field-label">Sleeve Printing</label>
          <select id="dtf_sleevePrint" class="select-field calc-trigger">
            <option value="0">None</option>
            <option value="3">1 Sleeve Only (+RM3)</option>
            <option value="5">Both Sleeves (+RM5)</option>
          </select>
        </div>
      </div>
    </div>

    <div id="panel-lanyard" class="panel">
      <div class="form-group">
        <label class="section-title">Lanyard Details</label>
        <div class="grid-layout">
          <div>
            <label class="field-label">Quantity (Min 10)</label>
            <div class="general-stepper">
              <button onclick="stepVal('lan_qty', -1)">-</button>
              <input type="number" id="lan_qty" class="calc-trigger" min="10" value="10">
              <button onclick="stepVal('lan_qty', 1)">+</button>
            </div>
            <div id="lan_warning" class="warning">Min 10 pieces!</div>
          </div>
          <div>
            <label class="field-label">Size Option</label>
            <select id="lan_size" class="select-field calc-trigger"><option>20MM</option><option>25MM</option></select>
          </div>
          <div>
            <label class="field-label">Buckle Option</label>
            <select id="lan_buckle" class="select-field calc-trigger"><option>With Buckle</option><option>No Buckle</option></select>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-apron" class="panel">
      <div class="form-group">
        <label class="section-title">Apron Details</label>
        <div class="grid-layout">
          <div>
            <label class="field-label">Quantity</label>
            <div class="general-stepper">
              <button onclick="stepVal('apr_qty', -1)">-</button>
              <input type="number" id="apr_qty" class="calc-trigger" min="1" value="10">
              <button onclick="stepVal('apr_qty', 1)">+</button>
            </div>
          </div>
          <div>
            <label class="field-label">Apron Type</label>
            <select id="apr_type" class="select-field calc-trigger">
              <option value="basic">Basic (100% Polyester)</option>
              <option value="exclusive">Exclusive (Polyester+Cotton)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-cap" class="panel">
      <div class="form-group">
        <label class="section-title">Cap Details</label>
        <div class="grid-layout">
          <div>
            <label class="field-label">Quantity (Min 10)</label>
            <div class="general-stepper">
              <button onclick="stepVal('cap_qty', -1)">-</button>
              <input type="number" id="cap_qty" class="calc-trigger" min="10" value="10">
              <button onclick="stepVal('cap_qty', 1)">+</button>
            </div>
            <div id="cap_warning" class="warning">Min 10 pieces!</div>
          </div>
          <div>
            <label class="field-label">Printing Type</label>
            <select id="cap_type" class="select-field calc-trigger">
              <option value="dtf">DTF Print</option>
              <option value="embroidery">Embroidery</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-bunting" class="panel">
      <div class="form-group">
        <label class="section-title">Bunting Details</label>
        <div class="grid-layout">
          <div>
            <label class="field-label">Quantity</label>
            <div class="general-stepper">
              <button onclick="stepVal('bun_qty', -1)">-</button>
              <input type="number" id="bun_qty" class="calc-trigger" min="1" value="1">
              <button onclick="stepVal('bun_qty', 1)">+</button>

  </div> <script>
    // --- Global Category State ---
    let currentCategory = 'sublimation';
    const categoryNames = {
      'sublimation': 'Full Print Sublimation Jersey',
      'silkscreen': 'T-Shirt (Silkscreen Printing)',
      'dtf_shirt': 'T-Shirt (DTF Printing)',
      'lanyard': 'Lanyard (Sublimation)',
      'apron': 'Apron (DTF/Silkscreen)',
      'cap': 'Cap (DTF/Embroidery)',
      'bunting': 'Bunting (Tarpaulin 380gsm)',
      'banner': 'Banner (Tarpaulin 380gsm)'
    };

    function switchCategory(cat) {
      currentCategory = cat;
      // Update Grid UI
      document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`.category-card[data-category="${cat}"]`).classList.add('active');
      // Update Panels
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + cat).classList.add('active');
      calculate();
    }

    // --- Data Matrices ---
    const shirtSizeConfig = [
      { id: 'xs', label: 'XS', sur: 0 }, { id: 's', label: 'S', sur: 0 }, { id: 'm', label: 'M', sur: 0 },
      { id: 'l', label: 'L', sur: 0 }, { id: 'xl', label: 'XL', sur: 0 }, { id: '2xl', label: '2XL', sur: 0 },
      { id: '3xl', label: '3XL', sur: 3 }, { id: '5xl', label: '5XL', sur: 6 }, { id: '7xl', label: '7XL', sur: 9 }
    ];

    const ssMatrix = [
      [7.82, 8.84, 9.86, 10.88, 11.90, 12.92, 13.94, 15.30],
      [5.55, 6.57, 7.59, 8.61, 9.63, 10.65, 11.67, 13.03],
      [3.74, 4.76, 5.78, 6.80, 7.82, 8.84, 9.86, 11.22],
      [2.72, 3.74, 4.76, 5.78, 6.80, 7.82, 8.84, 10.20],
      [1.99, 3.01, 4.03, 5.05, 6.07, 7.09, 8.11, 9.47],
      [1.78, 2.80, 3.82, 4.84, 5.86, 6.88, 7.90, 9.26],
      [1.59, 2.61, 3.63, 4.65, 5.67, 6.69, 7.71, 9.07],
      [1.29, 2.31, 3.33, 4.35, 5.37, 6.39, 7.41, 8.77],
      [1.20, 2.22, 3.24, 4.26, 5.28, 6.30, 7.32, 8.68],
      [1.10, 2.12, 3.14, 4.16, 5.18, 6.20, 7.22, 8.58] 
    ];

    function getSSTier(qty) {
      if(qty < 11) return 0; if(qty < 21) return 1; if(qty < 31) return 2; if(qty < 51) return 3;
      if(qty < 81) return 4; if(qty < 101) return 5; if(qty < 201) return 6; if(qty < 301) return 7;
      if(qty < 501) return 8; return 9;
    }

    // --- UI Generation ---
    function buildSizeGrid(prefix) {
      let html = '';
      shirtSizeConfig.forEach(s => {
        let badge = s.sur > 0 ? `+RM${s.sur}` : '';
        html += `<div class="size-item"><label>${s.label}</label><div class="surcharge-badge">${badge}</div>
                 <div class="stepper-wrapper">
                    <button type="button" class="stepper-btn" onclick="stepVal('${prefix}_qty_${s.id}', -1)">-</button>
                    <input type="number" id="${prefix}_qty_${s.id}" class="size-input calc-trigger" min="0" value="0">
                    <button type="button" class="stepper-btn" onclick="stepVal('${prefix}_qty_${s.id}', 1)">+</button>
                 </div></div>`;
      });
      document.getElementById(`${prefix}_sizeGridContainer`).innerHTML = html;
    }
    
    buildSizeGrid('sub'); buildSizeGrid('silk'); buildSizeGrid('dtf');

    // --- Stepper Logic ---
    function stepVal(id, delta) {
      let el = document.getElementById(id);
      let min = parseInt(el.min) || 0;
      let val = parseInt(el.value) || 0;
      val += delta;
      if(val < min) val = min;
      el.value = val;
      calculate();
    }

    // --- Local Storage (Auto-Save) ---
    function saveState() {
      const inputs = document.querySelectorAll('.calc-trigger');
      const state = { activeCategory: currentCategory };
      inputs.forEach(i => {
        if(i.type === 'checkbox') state[i.id] = i.checked;
        else state[i.id] = i.value;
      });
      localStorage.setItem('calcMasterState', JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem('calcMasterState');
      if(saved) {
        const state = JSON.parse(saved);
        for(let id in state) {
          if (id === 'activeCategory') {
            switchCategory(state[id]);
            continue;
          }
          let el = document.getElementById(id);
          if(el) {
            if(el.type === 'checkbox') el.checked = state[id];
            else el.value = state[id];
          }
        }
      }
    }

    // --- Clear Form Logic (Instant DOM Reset) ---
    function resetForm() {
      if(confirm("Are you sure you want to clear all inputs?")) {
        localStorage.removeItem('calcMasterState');
        
        document.querySelectorAll('.calc-trigger').forEach(el => {
          if (el.type === 'checkbox') {
            el.checked = false;
          } else if (el.tagName === 'SELECT') {
            el.selectedIndex = 0;
          } else if (el.type === 'number' || el.type === 'tel') {
            el.value = el.min || ''; 
          }
        });

        document.getElementById('bun_custom_box').style.display = 'none';
        document.getElementById('banner_custom_box').style.display = 'none';

        switchCategory('sublimation');
      }
    }

    // --- Animation Logic ---
    let currentBase = 0, currentSur = 0, currentTotal = 0;
    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = "RM " + (progress * (end - start) + start).toFixed(2);
        if (progress < 1) window.requestAnimationFrame(step);
        else obj.innerHTML = "RM " + end.toFixed(2);
      };
      window.requestAnimationFrame(step);
    }

    // --- Custom Size Toggles ---
    document.getElementById('bun_size').addEventListener('change', function() {
      document.getElementById('bun_custom_box').style.display = this.value === 'custom' ? 'block' : 'none';
    });
    document.getElementById('banner_size').addEventListener('change', function() {
      document.getElementById('banner_custom_box').style.display = this.value === 'custom' ? 'block' : 'none';
    });

    // --- Modular Calculation Functions ---
    let currentBreakdownList = [];

    function calcSublimation() {
      let qty = 0, sizeSur = 0, bDown = [];
      let sizeBreakdown = [];
      shirtSizeConfig.forEach(s => { 
        let q = parseInt(document.getElementById(`sub_qty_${s.id}`).value)||0; 
        qty += q; sizeSur += (q * s.sur); 
        if(q>0) sizeBreakdown.push(`${s.label}:${q}`);
      });
      document.getElementById('sub_totalQty').innerText = qty;

      let unitBase = 0;
      if(qty>0 && qty<=10) unitBase=45; else if(qty<=30) unitBase=35; else if(qty<=50) unitBase=33; 
      else if(qty<=100) unitBase=30; else if(qty<=200) unitBase=28; else if(qty<=300) unitBase=25; 
      else if(qty<=500) unitBase=23; else if(qty<=1000) unitBase=20; else if(qty>1000) unitBase=18;

      let bCost = qty * unitBase;
      if(qty>0) {
        bDown.push(`👕 <b>Sizes:</b> ${sizeBreakdown.join(', ')}`);
        bDown.push(`💰 <b>Base Cost:</b> ${qty} pcs x RM${unitBase} = RM${bCost}`);
        if(sizeSur>0) bDown.push(`📏 <b>Extra Size Surcharge:</b> RM${sizeSur}`);
      }

      let perPieceAddons = 0;
      let mat = parseFloat(document.getElementById('sub_material').value);
      if(mat > 0) { perPieceAddons += mat; bDown.push(`🧵 <b>Material Upgrade:</b> ${qty} x RM${mat} = RM${qty*mat}`); }
      
      let urg = parseFloat(document.getElementById('sub_urgent').value);
      if(urg > 0) { perPieceAddons += urg; bDown.push(`⏱️ <b>Urgent Order:</b> ${qty} x RM${urg} = RM${qty*urg}`); }

      let name = parseFloat(document.getElementById('sub_nameNum').value);
      if(name > 0) { perPieceAddons += name; bDown.push(`🔠 <b>Names/Numbers:</b> ${qty} x RM${name} = RM${qty*name}`); }

      document.querySelectorAll('.sub-addon:checked').forEach(cb => {
        let val = parseFloat(cb.value);
        perPieceAddons += val;
        bDown.push(`✨ <b>${cb.getAttribute('data-name')}:</b> ${qty} x RM${val} = RM${qty*val}`);
      });

      let designFee = parseFloat(document.getElementById('sub_design').value);
      if(designFee > 0) bDown.push(`🎨 <b>Custom Design Fee:</b> RM${designFee}`);
      
      let sCost = (qty * perPieceAddons) + sizeSur + designFee;
      return { base: bCost, sur: sCost, total: bCost + sCost, breakdown: bDown };
    }

    function calcSilkscreen() {
      let qty = 0, sizeSur = 0, bDown = [];
      shirtSizeConfig.forEach(s => { 
        let q = parseInt(document.getElementById(`silk_qty_${s.id}`).value)||0; 
        qty += q; sizeSur += (q * s.sur); 
      });
      document.getElementById('silk_totalQty').innerText = qty;
      document.getElementById('silk_warning').style.display = (qty > 0 && qty < 10) ? 'block' : 'none';

      if(qty < 10) return {base:0, sur:0, total:0, breakdown: ["⚠️ Minimum 10 pieces required."]};

      let sBase = parseFloat(document.getElementById('silk_shirtType').value);
      let bCost = qty * sBase;
      bDown.push(`👕 <b>Base Shirt:</b> ${qty} pcs x RM${sBase} = RM${bCost}`);

      let colors = parseInt(document.getElementById('silk_colors').value);
      let pCost = ssMatrix[getSSTier(qty)][colors];
      bDown.push(`🎨 <b>Print (${colors+1} Color):</b> ${qty} pcs x RM${pCost} = RM${qty*pCost}`);

      let ls = document.getElementById('silk_longSleeve').checked ? 5 : 0;
      if(ls>0) bDown.push(`🧵 <b>Long Sleeve:</b> ${qty} pcs x RM${ls} = RM${qty*ls}`);
      if(sizeSur>0) bDown.push(`📏 <b>Size Surcharge:</b> RM${sizeSur}`);

      let sCost = (qty * pCost) + (qty * ls) + sizeSur;
      return { base: bCost, sur: sCost, total: bCost + sCost, breakdown: bDown };
    }

    function calcDTF() {
      let qty = 0, sizeSur = 0, bDown = [];
      shirtSizeConfig.forEach(s => { 
        let q = parseInt(document.getElementById(`dtf_qty_${s.id}`).value)||0; 
        qty += q; sizeSur += (q * s.sur); 
      });
      document.getElementById('dtf_totalQty').innerText = qty;
      if(qty === 0) return {base:0, sur:0, total:0, breakdown: []};

      let sBase = parseFloat(document.getElementById('dtf_shirtType').value);
      let bCost = qty * sBase;
      bDown.push(`👕 <b>Base Shirt:</b> ${qty} pcs x RM${sBase} = RM${bCost}`);

      let pSize = parseFloat(document.getElementById('dtf_printSize').value);
      if(pSize>0) bDown.push(`🖨️ <b>Body Print:</b> ${qty} pcs x RM${pSize} = RM${qty*pSize}`);

      let slv = parseFloat(document.getElementById('dtf_sleevePrint').value);
      if(slv>0) bDown.push(`💪 <b>Sleeve Print:</b> ${qty} pcs x RM${slv} = RM${qty*slv}`);

      let ls = document.getElementById('dtf_longSleeve').checked ? 5 : 0;
      if(ls>0) bDown.push(`🧵 <b>Long Sleeve:</b> ${qty} pcs x RM${ls} = RM${qty*ls}`);
      if(sizeSur>0) bDown.push(`📏 <b>Size Surcharge:</b> RM${sizeSur}`);

      let sCost = (qty * pSize) + (qty * slv) + (qty * ls) + sizeSur;
      return { base: bCost, sur: sCost, total: bCost + sCost, breakdown: bDown };
    }

    function calcSimple(type) {
      let prefix = type === 'bunting' ? 'bun' : (type === 'banner' ? 'banner' : type.substring(0,3));
      let qty = parseInt(document.getElementById(prefix+'_qty').value)||0;
      let bDown = [];

      if((type === 'lanyard' || type === 'cap') && qty > 0 && qty < 10) {
        document.getElementById(prefix+'_warning').style.display = 'block';
        return {base:0, sur:0, total:0, breakdown: ["⚠️ Minimum 10 pieces required."]};
      }
      if(document.getElementById(prefix+'_warning')) document.getElementById(prefix+'_warning').style.display = 'none';
      if(qty === 0) return {base:0, sur:0, total:0, breakdown: []};

      let unit = 0;
      if (type === 'lanyard') {
        if(qty>=20000) unit=3.5; else if(qty>=10000) unit=4; else if(qty>=1000) unit=5.5; else if(qty>=900) unit=5.7;
        else if(qty>=800) unit=6; else if(qty>=700) unit=6.5; else if(qty>=600) unit=7; else if(qty>=500) unit=7.5;
        else if(qty>=400) unit=8; else if(qty>=300) unit=8.5; else if(qty>=200) unit=9; else if(qty>=100) unit=10;
        else if(qty>=80) unit=12; else if(qty>=50) unit=13; else if(qty>=40) unit=14; else if(qty>=30) unit=15;
        else if(qty>=20) unit=16; else unit=19;
      } else if (type === 'apron') {
        let aType = document.getElementById('apr_type').value;
        if(aType === 'basic') { if(qty<10) unit=20; else if(qty<20) unit=19; else if(qty<30) unit=17; else if(qty<=50) unit=15; else unit=13.5; } 
        else { if(qty<10) unit=30; else if(qty<20) unit=25; else if(qty<30) unit=23; else if(qty<=50) unit=20; else unit=18.5; }
      } else if (type === 'cap') {
        let cType = document.getElementById('cap_type').value;
        if(cType === 'dtf') { if(qty===10) unit=15; else if(qty<=20) unit=14.5; else if(qty<=30) unit=14; else if(qty<=50) unit=13.5; else if(qty<=100) unit=13; else unit=12; } 
        else { if(qty===10) unit=22.5; else if(qty<=20) unit=19.6; else if(qty<=30) unit=17.8; else if(qty<=50) unit=16.9; else if(qty<=100) unit=15.7; else unit=14.9; }
      } else if (type === 'bunting' || type === 'banner') {
        let sizeVal = document.getElementById(prefix+'_size').value;
        if (sizeVal === 'custom') {
           let w = parseFloat(document.getElementById(prefix+'_w').value) || 0;
           let h = parseFloat(document.getElementById(prefix+'_h').value) || 0;
           let area = w * h;
           if(area === 0) unit = 0;
           else unit = Math.max(23, (area * 2) + 3); 
           bDown.push(`📐 <b>Custom Size (${w}' x ${h}'):</b> ${area} sqft`);
        } else {
           unit = parseFloat(sizeVal);
        }
      }

      if(unit > 0) {
        bDown.push(`📦 <b>${type.toUpperCase()}:</b> ${qty} pcs x RM${unit} = RM${qty*unit}`);
      }
      return { base: qty * unit, sur: 0, total: qty * unit, breakdown: bDown };
    }

    // --- Main Controller ---
    function calculate() {
      let res = {base:0, sur:0, total:0, breakdown:[]};
      
      if(currentCategory === 'sublimation') res = calcSublimation();
      else if(currentCategory === 'silkscreen') res = calcSilkscreen();
      else if(currentCategory === 'dtf_shirt') res = calcDTF();
      else res = calcSimple(currentCategory);

      // Animation & Display
      animateValue(document.getElementById('out_base'), currentBase, res.base, 300);
      animateValue(document.getElementById('out_surcharge'), currentSur, res.sur, 300);
      animateValue(document.getElementById('out_total'), currentTotal, res.total, 400);
      
      currentBase = res.base; currentSur = res.sur; currentTotal = res.total;

      // Render Breakdown
      let bdHtml = res.breakdown.length > 0 ? "<ul><li>" + res.breakdown.join("</li><li>") + "</li></ul>" : "<i>No items selected.</i>";
      document.getElementById('breakdown-list').innerHTML = bdHtml;
      currentBreakdownList = res.breakdown;

      saveState();
    }

    // --- WhatsApp Generation ---
    function sendWhatsApp() {
      if(currentTotal === 0) { 
        alert("Please calculate a total greater than RM 0 before sending."); 
        return; 
      }
      
      let rawNumber = document.getElementById('wa_target_number').value;
      let cleanNumber = rawNumber.replace(/\D/g, ''); 
      
      if(!cleanNumber || cleanNumber.length < 8) {
        alert("Please enter a valid receiver WhatsApp number first.");
        document.getElementById('wa_target_number').focus();
        return;
      }

      let catName = categoryNames[currentCategory];
      
      let msg = `*Quote Details*\n\n*Product:* ${catName}\n\n*Order Breakdown:*\n`;
      currentBreakdownList.forEach(item => {
        let cleanItem = item.replace(/<b>/g, '*').replace(/<\/b>/g, '*').replace(/<\/?[^>]+(>|$)/g, "");
        msg += `- ${cleanItem}\n`;
      });
      
      msg += `\n*Estimated Total: RM ${currentTotal.toFixed(2)}*\n\nPlease confirm if the pricing and production time is available. Thank you!`;
      
      window.open(`https://api.whatsapp.com/send?phone=${cleanNumber}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    // --- Init & Event Listeners ---
    document.addEventListener('input', function(e) { if(e.target.classList.contains('calc-trigger')) calculate(); });
    document.addEventListener('change', function(e) { if(e.target.classList.contains('calc-trigger') || e.target.type === 'checkbox') calculate(); });

    // Load saved data and calculate on startup
    loadState();
    
    if(document.getElementById('bun_size').value === 'custom') document.getElementById('bun_custom_box').style.display = 'block';
    if(document.getElementById('banner_size').value === 'custom') document.getElementById('banner_custom_box').style.display = 'block';

    calculate();
  </script>
</body>
</html>
